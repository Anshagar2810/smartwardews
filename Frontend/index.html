<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Ward EWS</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/styles.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- App Scripts -->
    <!-- Load components first so they are available on window object -->
    <script>window.API_BASE='http://localhost:5001/api'</script>
    <script type="text/babel" src="js/components/Icons.js"></script>
    <script type="text/babel" src="js/components/LandingPage.js"></script>
    <script type="text/babel" src="js/components/AuthPage.js"></script>
    <script type="text/babel" src="js/components/AdminDashboard.js"></script>
    <script type="text/babel" src="js/components/DoctorDashboard.js"></script>
    <script type="text/babel" src="js/components/NurseDashboard.js"></script>
    
    <!-- Main App Entry -->
    <script type="text/babel" src="js/app.js"></script>
</body>
</html>
